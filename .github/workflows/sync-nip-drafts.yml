name: Sync NIP to nip-drafts

on:
  push:
    branches: [main]
    paths:
      - 'NIP-VA.md'
      - 'assets/*.svg'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkout nip-drafts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: forgesworn/nip-drafts
          path: nip-drafts
          token: ${{ secrets.NIP_DRAFTS_PAT }}

      - name: Copy NIP-VA.md and SVGs
        run: |
          cp NIP-VA.md nip-drafts/nips/NIP-VA.md
          mkdir -p nip-drafts/assets
          cp assets/*.svg nip-drafts/assets/

      - name: Commit and push to nip-drafts
        working-directory: nip-drafts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nips/NIP-VA.md assets/
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "sync: NIP-VA from nostr-attestations@${{ github.sha }}"
            git push
          fi
